body:
  text: 自序夫春去秋來歷萬古常新者天地之景象也澄心凝思眇衆慮著書者學志之胸懷也是故雖萬歲後著書之事無盡者與春秋花月之年年新者奚異焉余壯歲聚所發明經驗之理法已成數卷題為青囊瑣探將厄黎棗而未果矣後觸事廣之纍月積年筆新得者竟獲為十餘卷因釐為五集以類命名其如傷寒啓微産科發蒙已刻而問於世今如此集則録耳聞目睹偶有觸發者詹詹小言蓋是媵説脞記之類或恐來人之嗤笑然其間存人情之所不能免及理法之有灼驗者此亦所以學者之胸懷與天地之景象俱同而日新無盡也享和改元白雞春二月十三日鶴陵片倉元周撰並書序余每閲書遇錯訛則必正焉否則意不苟安此我一痼疾耳片倉深甫嚮者著産科發蒙讀其稿本一系産育啞科時有校陶陰頃日召見之攜來青囊瑣探請余校並序余素不讀醫書妄應其需非心所安矣嘗試閲之雖稱瑣記而頗該博隨見聞録之而無詮次其徵文獻者數十家證引該博憤悱啓發往往適余意者多矣加之深甫受業於太醫令多紀氏之門也余於多紀氏纍世通家則豈可執不知醫事不為之序乎多紀法眼且叮嚀曰古今之醫典為之序者奚翅刀圭之人余謂炎黃岐伊而下如張長沙王外臺未聞方技世家況獨為之序乎何以固辭為而中特一二有可論者始舍而不肯言以俟後之認者耳此為序聊應其需享和弟二杏月下浣播磨白鷺城太守忠道撰並書

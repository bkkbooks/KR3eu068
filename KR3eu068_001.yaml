body:
  text: 上卷碑醫余自少小好醫方每見長者必問其道有一宿老曰吾子能奮勉勿為碑醫余俯思久之不得其解乃叩碑醫義曰建橐以還百有餘年四海寧謐誠是學者成不朽業之秋也而醫人之多國初以來未有若今日也然率皆競馳勢利雖至皓首無一葉書著述死而遺者僅墓上一片石而已故我謂之碑醫矣嗟宿老言可謂使人發憤激也看書二途余每觀世醫之讀書者蓋有二途焉好學問而深於治療者先熟讀其論然後及藥方不好學問而但聚奇方妙藥為治療者不讀其論而先閲藥方矣吾惡其先藥方者特不執古方自仁齊徂徠二先生唱復古學醫家亦效顰動稱復古乃以素難為後人之僞作而排之特講究仲景氏之書者數家其功亦偉矣然至其甚則使子弟輩禁觸目於晉唐而還之醫籍乃言傷寒論湯方足治萬病奚用多之為觀其識見則雖愈快至治衆病則不能免牽強附會矣蓋因其人立一家法雖有奇病異疾恥用後世之方專執古方而誤人命者亦不為鮮豈仁人之意也哉夫天下事有古人未明而後人詳之者譬如日食秦漢以前皆莫能先知故春秋書日食三十有六記異以警人君也後世巧曆家推測殆盡上下千百年皆可坐致豈古之皆是而後之皆非邪而況在醫家亦後世之論勝古昔之說古昔無有之病後世偶起而人論定於後而功於世者不為少乎故獨執古方者我未敢信也貴著書神祖奠鼎之後升平日久名於醫者不乏矣京師有奈古屋丹水後藤艮山香川秀庵吉益東洞等諸傑而各倡一家學其名震海內雖互有得失亦可謂勤矣而東都醫者起家世祿者不暇枚舉然學術兼備立一家言著書以垂後世者寥寥乎何也蓋東都則上而大君在焉次而諸侯在焉是以醫氏偶治權家病取效則名聲聞於諸侯間或為官醫或為列國醫官遂擅權怙勢泰然安其祿是以諸醫家每豔羡之率皆青雲志汲汲而不朽業疏疏焉夫世祿則至子孫或有失著書則千歲不朽學醫者於斯二者間不可不深察也真醫醫不讀書則不能治疾不治疾則不能解書能兼斯二者然後始可謂真醫者也若夫謂雖不讀書能治人疾者不敢謂然也弟子問弟子輩問曰何如可得醫學成也豫曰汝等有色欲情邪皆莞爾笑不答豫曰汝等欲珍膳美味歟皆曰然夫男子及長也見佳治窈窕之美則心魂飛揚為宋華父督見孔父妻於路之態又東鄰處女挑之或遊里娼妓似有情則戀戀之心往來於胸中雖寢食間不能忘焉此少年之常情也若溺之者至於學不成而遂亡身失家矣子夏曰賢賢易色豈非戒之乎又於珍膳美味亦人情所自嗜是以丹溪特作飲食針故取好斯二者之心以用之醫學則曷得不成名於一世哉其用心如此而生涯不能成者守汝至愚而安其分而已扁倉仲景余讀史記扁倉傳二公之指死生如懸鏡睹之實可謂神於醫者然其法其方皆不傳則雖稱神無一益於後學雖然見採於良史名冠於方技中若夫微太史其名必湮沒矣夫仲景纂集古之湯液論以著傷寒論傳之萬世百代之下賴是免夭橫者無有涯極雖然范曄不收於史其傳皆出於後人嗚呼為良史所採而名冠於方技者與不見收於史而其書功於萬世者其德澤之優劣何如乎諸侯病難治有十三諸侯之病難為治療者有十又三焉漢郭玉對和帝曰貴者處尊高以臨醫醫懷怖懼以承之其為療有四難焉自用意而不任醫一難也將身不謹二難也骨節不強不能使藥三難也好逸惡勞四難也豫續之曰醫既到則於客次移時延患者室中甚遲是以有識者惡其簡慢一也醫診脈訖則速自房內出是以不能詳音聲氣息動靜二也侍醫數輩應對問治劑不愜其意則竊拒之三也畏峻藥而好補劑是以雖有實候不能施巴豆硝黃之類四也不自言其所苦之證候而使侍臣言之是以動輒不能悉其患狀五也內醫之得寵者慮他人若奏效則我寵之或衰乃嫉有識者而竊掣其肘六也病稍重則保護慎重之弊延醫甚多或日至十餘人其看脈按腹握手足無有間斷不知過保惜而反患者致疲勞七也又方夫人有疾按察腹部則必隔繒一層而視之是以不能詳皮膚之潤澤枯燥八也又至其甚則不露全軀自簾內出手令視脈是以不能詳眼中面色舌候九也凡此類可謂不解事之甚也夫召醫者為蠲疾苦也假令高貴人苟臥病中則宜尊重醫若夫以無爵位輕視而自不言所苦或夫人以男女有禮不令觸手於腹部等事非託病之本意醫亦對貴人勿恐懼恐懼則智不能振智不能振則往往鮮有奇中又診富人勿有諛心有諛心則心暗而失醫之本旨矣解毒奇方高濂靈祕丹藥箋載解中諸物毒方用白礬一錢細茶一錢井花水調服以吐出為妙余近讀王緘秋燈叢話曰萊郡劉某遇僧授海上方多效其解砒毒尤為神驗戚某屢求不與銜之乃置酒延劉食畢扃其戶謂曰爾已中砒毒矣速語我方為爾療劉不信頃覺腹中潰動乃曰何惡作劇如是可疾取白礬三錢來戚如言取至調水飲之立解因惡其吝也榜其方於通衢元周按嚴氏濟生方治中諸蠱毒用晉礬建茶瑞竹堂方療蛇蠱諸毒用白礬甘草則礬石之解中毒冠於諸藥者可以知矣頃讀陳明善洗冤録曰泉州一僧能治金蠶蠱毒如中毒者先以白礬末令嘗不澀覺味甘次食黑豆不醒乃中毒也即濃煎石榴皮根飲之下即吐出蟲皆活無不愈者槐花解河豚毒治中河豚毒者鯗魚銼水煎服或將白礬末冷水調服或飲穢物之類人所皆知也昨閲輟耕録曰凡食河豚者一日內不可服湯藥恐有荊芥蓋此物大相反亦惡烏頭附子之屬世傳中其毒者亟飲穢物乃解否則必亡又聞不必用此以龍腦浸水或寶丹或橄欖皆可解後得一方用槐花微炒與干燕支各等分同搗粉水調灌大妙余雖未試記以具遺忘細心膽大醫之臨疾病處湯方非細心而膽大則不能治危險證也人參生薑凡物價貴則人重之價賤則輕之世人當有病用人參則稱之而正其毫釐者甚嚴也而至用生薑幾片則委奴婢手不敢顧焉假令其用一片姜有干潤切有厚薄而輕重每不等也嘗閲奇效醫述曰生薑三片為引約重二錢云云然則一片重六分六釐余也若夫使生薑價如人參甚貴則世人必可正其權衡矣噫臨病立湯方猶向師立陳法雖生薑有時為將雖人參有時為卒豈可以價賤常多輕視之乎世醫亦恬然以此任病家可以發一笑也上總州舌疳藥余童年在藍溪先生孰中時竊思吾長而為人治疾小恙則嵌甲鵝眼黑痣雞眼子等大患則傷寒腳氣痢疾之類莫論而已其他至於癩疾癲癇鼓脹偏枯勞瘵肺癰舌疳乳癌等之古今所難治者亦欲得奇方妙藥以盡治之是以求諸百家醫籍或問諸友朋後遊城攝探名家祕方試之今且二十餘年經驗不可枚舉也然至於鼓脹偏枯勞瘵肺癰乳癌舌疳邦俗呼曰舌疽則取效僅僅無幾常以此為憾焉嗚呼此數證素系廢疾者歟曩橋本四郎左者抱病與吉田道見俱自上總州九十九里來就余求治渠云鄰村有一老醫妙起舌疳然祕惜其方不敢傳人余頃請賴二子以重利傳其方未落我手中近吉田道見得此方來傳之因録後卷宜以參看不見前醫發劑凡有病之家延醫服藥數日猶未見效則信疑相半遂又召他醫出前醫之發劑以問可否豫每臨如此則不見其劑夫人心不同如其面有誰與我意符合者乎若見其藥我以為不可也豈可默止乎若吞之而為可則失信於患者也且以彼之所是我非之則恐為妒婦之口此余所以不見前醫之發劑也若病家篤信余懇請治無二心則披見前醫之措劑識得其攻補奈何然後與藥矣籲以辨口炫術之醫自我乞覽前劑漫謗其缺當以欲奪人功假令其術不拙殆可謂小人也野葛救飢人吉益為則發補虛論唱萬病一毒說而一概用攻擊之劑以樹立門戶積年痼疾胃氣未衰者用峻藥往往取奇效於是一時遊其門者頗多矣而其徒既學之乃泊試之於衆病亦不免野葛救飢人也茯苓飲壯元湯外臺祕要茯苓飲赤水玄珠壯原湯天下醫無不口之者而親讀其書者稀矣雖知傷寒論為法方之鼻祖研究之者十之一二耳口中糜爛藥寬政辛亥三月晦余夢中得口中糜爛百藥不能療之妙方覺而援筆録之其方大黃黃連麵粉各等分上三味入絹袋熱湯浸頻頻含漱即愈姑記之以廣同學鵝眼風妙方豫曩歲遊京師寓柳馬埒木地屋某所此家以制蠶絲為業豫僑居之間與其僮僕評論兩都文物之盛豫則誇東都雄壯彼則稱京師秀麗日夜相爭其優劣不休焉有一甲幹適患鵝眼風試敷膏諸藥並不效一日問豫曰貴客可治此乎否豫笑曰東都醫者此等小恙猶振稿也嘗聞輦轂下名醫衆而此是小疴數醫不能治若遇大患措方如此則恐至病邪沉淪而不救爾如豫者在東都醫中之尤拙手雖然當限七日愈此疾也彼乞藥豫欲令信先以旅中所攜平胃散一匙隱其名與之相囑曰須少水和勻擦患處即以青杉葉一握置炭火上乘黑煙升騰之時熏之日三回乃如法行之五日而全瘳豫歸東都後歷十載而彼致書以乞治鵝眼之散藥嗟未知一品青杉葉熏鵝眼有奇效乃以為奏效者全在敷藥之力是以不厭山海千有餘里之遠致懇書以索蛇足物豫曩欲示奇而偶兼用平胃散者耳今及得書簡竊悔向日之權譎因解其事傳其方紀之為後來不可欺人之龜鑑云參附硝黃病既至危殆則世醫皆頻投參附之劑以為極精力盡人事無逾於此者矣而其斃也病家亦無有遺憾焉以余觀之殊不然夫人之死也有由邪實者有本正虛者正虛之用參附也固其所也如夫邪實者則死期雖已迫不可不與硝黃之類而建摧陷廓清之功也豈致皆資於參附哉卒中風妙藥中風卒倒昏不知人者取活鶩血灌口中即蘇極妙頃閲紫芝園漫筆亦載此事余繹其所自實出於聖濟總録麻沸湯錢天來傷寒溯源集云麻沸湯者言湯沸時泛沫之多其亂如麻也全生集作麻黃沸湯謬甚元周按陸羽茶經形容沸湯而為蟹眼又千金方曰蟹目沸及蟻鼻沸者並同褥瘡方或云治褥瘡取小粉糊經三四年者貼患處極妙余視人之用之頗驗矣糊陳久者褙裱匹皆貯之又褥瘡方鹿角霜黃柏南星栝蔞根各等分為末水和調傅患處病人死候凡病人肌肉柴瘠者手腕後肉脫而形匾醫握其中央時指頭將相合者不問何證為死候也雖飲食如故此遊魂之假息耳勞瘵之病纍月後必見此候唯傷寒痢疾腳氣後有此候者往往愈數脈惡候人感外邪而脈見浮數者此其常候用解表之劑發汗則其脈和矣其他一切疾病浮數弦數沉數細數並皆惡候也竟成不治之證又病人常呼吸短促者不論何證罕得生者二者不可不詳察也皮膚之寬緊久病之人雖羸瘦甚其皮膚寬而有皺者盡有得生者若皮緊而無皺者必致不起是余之所屢驗也無名腫毒妙方王士禎居易録云前寧都令李聘說麥粉不拘多少用陳醋熬膏貼無名腫毒神效同志者宜制以試之陶器醫東都本街傳馬街者巨賈所居也近坊醫家有賴此兩街而為生活者數人焉每朝醫者往其商家診僮僕之病者回家調劑乃連灶煎煮數人藥入陶器以小箋記患者姓名糊黏其上乃肩奴以致名家必不勞病家臧獲也雖無患者之時醫日往問寒暄猶仕主家世俗呼之曰陶器醫都下雖廣大未聞他處有此風也蓋此媚醫之所創遂為習耳說此於他邦人未為信焉片倉家言取法方於湯液之遺文以為施術規度選神藥於後賢之書籍以為應變治具藥為病役醫之治疾病與湯方病服則多奏效矣若患者惡聞藥氣或病遷轉而至於湯方為病所役則多不能取效也闢蚊蟲豫頃閲體仁彙編載闢蚊蟲一方雖未試之若能有驗則當夏夜讀書之時可省侍童之勞也其方六月蠶沙夜明沙浮萍更加苦楝花每到黃昏燒一炷蚊蟲飛過別人家又王璆百一方載驅蚊蚋闢蝨方蒼朮一斤木鱉子雄黃各二兩半上為細末蜜丸如彈子大床下燒一丸或於蚊合時當門燒之熏落如面淨盡金箔本邦金箔方二寸八分厚如美濃紙也方書有謂金箔幾許片者豈與此邦金箔其闊狹厚薄相同否豫疑之久之曩得一古書蓋大永中竹田昭慶以所問其師筆録者也豫姑名曰大永醫話其書曰中華金箔形甚小宜以四片對此邦一片即師出中華金箔以示云云又覽遠藤元理本草辨疑中華金箔方一寸許比此邦者甚厚宜以二片敵一片云云二說雖互異以此推之當不失其大要矣糯糍噎塞不論大人稚子有啖糯糍偶噎而黏著喉間咽咯不移遂呼吸難通躁擾煩悶而致橫夭者當是之時雖有神丹奇湯不能落腹中坐視其斃豈不悲乎豫頃獲一奇術其法取牛膝一條尺許者急入口中向胃脘里推下一送則忽得喉嚨開豁而安如無牛膝則代牛蒡根若並無則以摺扇取去母骨及紙以子骨相重切去尖濕紙包裹以代之亦可肉脫死候水泉既涸雖有帆穡篙笮無所用之形肉既脫雖有良藥奇方奚能回生灸女室續醫說引癸辛雜志云劉漢卿郎中患牙槽風久之頷穿膿血淋漓醫皆不效在維揚時有丘經歷妙於針術與漢卿針委中及女膝穴是夕膿血即止旬日後頜骨蛻去別生新者完美如昔又張師道亦患此證復用此法針之亦愈委中穴在腿䐐中女膝穴在足後跟考諸針經無此穴惜哉後人未之知其神且驗也元周嘗受治失心驚悸癲狂氣逆等之祕灸於一老翁灸足後跟赤白肉際左右各五十壯經驗頗多即是女膝穴也近田安藩松野某患骨槽風左頷穿一孔膿血淋漓不絶已三年餘數之日灸女室穴一月而全瘳因並録於此以示同志松野致書以謝之附於後腎囊濕潤有男子常腎囊濕潤不幹者牡蠣螺殼五倍子緑豆以上四味為末敷之無不愈者心膈痞塞太永醫話云心膈痞塞證加人參半夏橘紅必奏奇效余按此即半夏瀉心湯之意也似近代吉益東洞以人參治心下痞硬為特得見然三百年前既有此說不足為奇枇杷葉祛痰又曰枇杷葉祛痰甚妙此本草所未言及余試之頗驗鼻衄妙藥鼻衄如水淋漓不止諸藥不效者以萆麻子擂加百草霜少許貼前頂穴即止若不止者針委中出血無有不止者蘭草蘭草和名膚日跋葛末也此品芳香之氣開胃中菀陳消食進飲食除痰和氣治小兒谷症及尋常滯食夾外感者最神效又能止嘔吐治消渴氣味辛平亦有發散之功而前輩用之者甚鮮矣奇病論曰數食肥甘令人內熱中滿其氣上溢轉為消渴以蘭除陳氣李東垣據之治消渴生津飲用蘭葉豫嘗擴經旨不惟治消渴凡食肥甘胃中生鬱滯成病者皆用之小兒好食肥甘生病者常多豫每每用之見奇效又神農本經云利水道殺蠱毒闢不祥別録曰除胸中痰癖豫又本於此用凡胎毒為患者及發黃小便淋瀝或因痰飲作諸症者皆驗夫內經所言則治數食肥甘內熱氣上溢轉為消渴者豫之所言則治食肥甘內熱氣未上溢而為諸症者雖所言似異其實則同焉此藥太平之世治雜病日用之品故吾門常以此品代藿香見奇效每多甘草甘草主治緩急和胃協和諸藥解百藥毒者人所知也然未知以此一品治他病凡小兒啼哭逾時不止者以二錢許熱湯浸絞去滓與之即止又初生芽兒咽喉痰壅聲不出者頻與生甘草如前法又傷寒經日不省人事譫語煩躁不得眠者每服五六錢水煎晝夜陸續與之神效此取本經所謂主治五臟六腑寒熱邪氣也其他癲疾發而搐搦上竄角弓反張者及嘔吐不止水藥入口即吐用半夏生薑竹茹伏龍肝之類益劇者用此有奇效不可不知也小兒白禿瘡治小兒白禿瘡以石膏一味極研末漿水和調塗患上即瘳此法極妙南土桑名玄清所屢經驗鴨跖草鴨跖草和名資幽孤薩氣味苦寒無毒主治寒熱瘴瘧小兒丹毒矣此藥解熱毒之妙劑也余嘗用傷寒溫疫熱邪不解者取效甚多今人未知有斯奇效須試傷寒啓微所載新定方中用此者而後始知其功效之神也鄙人治久嗽木工街典鋪某患夜嗽纍月不止數醫不效偶一鄙人謂曰醫家治久嗽率皆泥理取效甚遲矣吾有一奇方君服之不出五日而必見效商乃依其法三日而全瘳其方雞卵一枚去殼入熱湯中更入砂糖薑汁少許攪勻服之旦暮各一云失精有熱症戴元禮曰失精夢泄有經絡熱而得者若以虛冷用熱劑則精愈失此證恍惚膈熱乃驗其證也本事方清心丸最良以此見赤濁亦有因熱而得亦可用此清心丸方黃蘗一兩為細末用生腦子一錢同研勻煉蜜丸梧桐子大每服十丸至十五丸濃煎麥門冬湯下元周曰夢遺屬熱證者必恍惚膈熱此古人所未論可謂卓見也入浴昏倒入浴昏倒者邦俗謂之湯氣此證市中混堂往往有焉其輕者以水灌之即蘇若行之尚無效則醫亦窮於措劑余壯歲於三因方上取方用此屢得驗矣陳無擇云入浴暈倒口眼喎斜手足嚲曳皆濕溫類也苓朮湯主之即五苓散加乾薑附子方又與大全蠍附散亦效方附子炮去皮臍川烏炮去皮尖麻黃去節殭蠶炒南星防風各三錢雄黃硃砂全蠍各錢半白芷藁本各半兩上為細末每服半錢蔥茶調下食後服治烟草毒人有嗜烟草暗中其毒咳嗽頻發頭目岑岑或五心煩熱或覺面如火氣升騰者余曩歲遇此證記得蔣示吉所論乃用其方見奇效因録其論治以示同學望色啓微曰煙筒為煙煤所塞用砂糖泡湯淋之其煤盡消蓋治煙毒之藥必加砂糖矣北人曰檳榔解煙毒亦驗總之熱毒發狂用泥漿水和藥服萬物歸於土而性解用之亦可楚中一商性急而嗜煙閲三日五心發熱咳嗽大作百藥不愈豫診之六脈俱洪火症也莫非煙毒乎其人亦悟曰吸烟則嗽愈甚遂以麥冬知母山梔花粉黃芩蘇子甘草蔞仁枇杷葉煎成去渣入砂糖一兩和服四劑而痊癰疽妙方治癰疽將發者與忍冬丸極妙然不宜虛人方以忍冬莖葉共灌酒焙乾細末打米糊丸梧子大此方本出奇效良方痰飲門而本邦古老醫所經驗也四目本草綱目蕓薹子條引陸氏積德堂方曰蜈蚣傷螫菜子油傾地上擦地油摻之即好勿令四眼人見不知四眼人何義或以為懷孕婦非也緑竹堂簡便方曰治肉骨魚骨梗喉不要四眼見即將箸來倒轉隨便鉗肉一塊急下即愈又匯聚單方治瘧疾於五更時取大蜘蛛一個用絹或包頭捲了蜘蛛縛於病人臂膊上男左女右大約二三日即止若臂膊上起大泡一個尤止得快但只許一人知見不許四眼見昨偶讀醒世恆言明人所著小說元來情色都不由你那女子在茶房裡四目相視各有情云云觀以上諸說則即知四眼者兩人相視之謂可以確證矣死生難決醫之臨病也先以決死生為之先務矣豫極力於茲數十年所指多不爽然偶有失之則自切齒而憂吾才之短又竊思雖古之名賢或不得不失矣何則張仲景曰視死知生實為難又宋初虞世以醫名天下而視皇子鄧王癇疾曰必可無虞不三日而王薨可見死生之難決者名賢既如是由是觀之使古之扁倉華他在今世而親見其臨衆疾恐當不百發百中焉池田痘疹書余嘗著痘疹微義未上木寬政初門人佐藤中節遊京師得痘疹唇舌口訣一本此書系於黃檗出僧戴獨立號曼公所著而門人池田正直筆記曾孫瑞仙所撰次也余讀之診候精密治法詳審勝於余之撰遠矣乃呼門弟子謂曰自今以往欲精乎痘疹治法舍余而宜從池田氏學焉及以余之草稿本悉燒之矣不貴美與雅田藝衡留青日札曰管晏之文無鹽醜女也雖醜而有益於國莊列之文西施美婦也雖美而無裨於世余亦曰寓意草治驗文雖雅無益於治赤水玄珠醫按文雖俗有裨於醫夫文美而亦有益於國者左氏之傳文雅而亦有裨於醫者仲景之書爾祕方宜廣傳王損庵筆塵云祕方廣傳則不效此王氏偶得稀痘妙方以當廣傳人令試之其驗甚少遂為此言者爾今之靳方者動輒引王氏語以為祕方不可傳人矣夫痘者胚胎之始陰血濁氣所固有者生來之後觸時氣而發出也故其輕重元自有分爾豈有預服藥而痘稀之理乎王氏未悟此義見稀痘一方不效而概言其他者不亦過乎若以祕方人人隱惜不廣傳雖有神驗妙方經久則恐煙沒矣夫芋梗治蜂螫老胡瓜治火傷香菌解鰹魚毒之類不暇枚舉傳之千萬人而千萬人皆效噫王氏之一語可謂殆非仁人之言也大鰻鱺今人見鰻鱺魚之大者則皆言海鰻鱺殊不然也阿州母川所産者甚大而他州之所未有也寬政甲寅四月於栗山先生所視鹽淹干藏者二頭其一長四尺五寸圍一尺二寸其一長三尺余身淡黑而腹白背方肉鬣連尾者不異於尋常鰻鱺形狀唯頰後鬣甚厚而大倣佛如耳先生云活時稱之大者九斤余云豫曩有一僕羽州秋田人也言我鄉有款冬之大者莖大一搦許葉廣可充雨傘嗟乎造化之生物由殊方形狀迥異者如此陰癬奇方世治癬方極多余之所經驗既載雜病試效頃得治陰癬妙方於一爻人記以廣傳其方慈菰不拘多少搗爛取汁牡蠣細末和調敷患處七八日而必效云麻疹預防麻疹流行之際以紫根二三錢照常水煎服之則必避之假令罹此疾必稀少不害生命真絶世之妙方也安永丁酉歲天下麻疫大行甲州一士人三間某者一家七八口適服此藥四鄰悉患麻疫而此家獨不染遂傳之親戚皆盡驗云因記以示同學鬼哭灸狐貍之憑人使人語言錯亂恍惚失神或識未到之處或書未知之字或其力倍常治之之法宜灸鬼哭穴乃以道理責之必去矣鬼哭灸法以患人兩手大指相併縛定用大艾炷於兩甲角甲後肉四處騎縫著火灸之若一處不著火即無效灸七壯病者哀告我自去神效此秦承祖灸鬼法也豫往年治神田某妻忽患狐祟即以此法奏奇效小山氏之母奇疾紀州新宮村小吏小山氏之母齡幾八十自壯歲患腰痛發作有時他無所苦丙午冬偶周身浮腫因進藥餌然以媼平素惡聞藥氣不敢服子孫亦以其壽高也不強與之任其自然矣至丁未春腫滿漸減而覺腹中微痛至五月初徹胸膈痛益甚飲食不下數日已收後事以待斃至七日晨忽膻中疼痛如齧如裂連咳三四聲吐異蟲一個其形似牛蝨淡灰色長八分廣七分厚四分頭面貼身眼鼻不分嘴尖無尾足長三分許褐赤色節白二足在口傍六足在腹下全身柔軟如新制糯糍背上及腹有八字樣隨步動成扁成圓學家駭異以視人試灸背腹七壯不死或灌殺蟲藥汁或放溫湯中亦復自若經四日而始死矣媼病全安此同邑堀烏仙親視云姑録以廣異聞呼吸短促凡人常行步則呼吸短促積日纍月後發浮腫者必難治若水腫病中而發呼吸短促者得治而愈者多前輩難信先哲治妊婦之病禁用腦麝丹皮桃仁紅花之類余始守是戒堅信而不妄施矣曩余之所親善一武士妻既六七産而又孕其夫請墮胎藥余不敢許彼強請不止遂乃教之曰宜以麝香一錢分二服乃如法服之而婦安然後又與此藥於一婦人亦復如故而及期月並易産子母亦無恙未數年其兒俱發痘甚稀少今皆壯健籲書之難信往往有如此之類不可不詳察也不輕改字明方有執著傷寒論條辨恣改易原文次序以為之注釋於是後之醫家凡注傷寒論者無不效方氏顰而易章改字矣夫於古書改字句非有確然明證則奚可輕改邪世說載韓昶性頗暗劣嘗為集校理史傳有金根車昶以為誤悉改為銀又王士禎居易録載文苑英華辨證十卷宋嘉泰中廬陵鄉貢進士彭叔夏撰云云自序云叔夏嘗聞太史益公之言曰校書之法實事是正多聞闕疑叔夏年十二三時手鈔太祖皇帝實録其間云興衰治之源闕一字意是治亂後得善本乃是治忽三折肱為良醫信知書不可以意輕改云云噫近代之妄改竄傷寒論者不無金銀治亂之類也樺甲斐德本所著梅花無盡藏往往有稱樺者未詳為何物焉或以為葛跋薩孤剌訥葛窊或言苦楝子細末打米糊和勻扁如棋子大曝乾聽用未知何是疑之久之近一病客自上總州來語次及德本之事曰我邑有一老醫識所謂樺而為人治疾每奏奇效曩族侄患口瘡衆工無效延渠求治乃發一小劑曰此是二陳湯也而加黑炒如炭者二三錢曰此德本所祕樺是也用此七日而全愈豫曰以重物購其方何如患者曰渠祕惜不傳仄聞東都有誹人木村小知者獨授其方夫木村者豫二十年前所邂逅而齡已八旬余也豫即日訪木村於細柳街廬乃叩樺事曰有之因請傳其方曰今日當芭蕉翁百年忌日寬政十二年十月十二日誹友數人在堂紛擾亦甚請重來則可傳也次日子攜酒果侵晨往則木村感豫之好醫方之厚便出一書傳之其方黃連黃芩大黃肉桂各等分上四味細銼黑炒者耳夫樺雖諸說不一觀寒症熱症俱用此品則三黃之苦寒中合肉桂辛熱而黑炒者甚妙此必德本所用之樺正是也豫不忍自祕録以公之癜風良藥赤白癜風本屬難治症矣近讀大永醫話得一奇方附子皮硫黃礬石鐵精上四味等分極細末先使患者浴去垢膩而後貼藥於患處乃火焙乾復浴而貼藥火焙如前法日三四遍數日而必愈又門人齊藤生經驗癜風方焰硝硫黃各等分上細末酢調敷患處神效萬病回生丹豫往年讀濟世碎金方得萬病回生丹每遭大人小兒危急症與之取奇效不鮮矣因録於茲與衆俱之其方明雄黃生膽礬滑石生各二錢上為細末大人五分小兒三分白湯調服一時即吐頑痰回生起死轉手在人不可草草主治善吐頑痰專治中風不語一時昏悶不省人事小兒急慢驚風四肢抽掣欲死者又治咽喉瘋緊閉牙關不開痰涎湧盛咽喉拽鋸瘧疾痰喘咳嗽又治雞骨哽咽喉不得上下神效服之一字即吐頑痰此藥有起死回生之功原費銀十兩願刻之以公天下養生君子萬莫輕視寶之神效與比云泉家寶方狐臭妙方腋臭謂之體氣又稱胡臭或作狐臭而治之之方俗間頗多矣然至為根治則人所實難也頃覽體仁彙編得一奇方乃試之甚驗只要使患者如法用藥無怠慢耳此症人患者多倉卒無藥及欲斷根源用此方用自己小便洗一次米泔洗二次自然薑汁每日擦十餘次一月之後可以斷根周常擦薑汁訖敷後方最妙治體氣方枯礬松香各一錢輕粉二分蛤粉二錢密陀僧五分麝香半分上為末每用少許擦之又閲熊宗立山居簡要醫方便宜載一方乃舉於茲備應用黃白散治狐臭黃丹白礬膩粉等分為末臨睡時抹之可使半月而愈粒甲丹東都一商家賣稱粒甲丹藥主治萬病危篤者又使病人不寐者能睡是以一稱睡藥其方人參六錢虎膽阿片磁器研經年者良真珠各二錢麝香龍腦各一錢烏蛇七分半木香五分上八味細末外以艾葉黃連黃芩各二錢濃煎汁前藥和勻研千遍漆器上陰乾再為末米糊作錠聽用其服之必睡者以瞑眩於阿片毒也嘗松下街浴室商患咳嗽浮腫偶親戚進此丹乃以一錠一日服盡昏睡半日夜及其稍醒發熱大渴煩躁悶亂晝夜不寧三日而斃夫物之有能者必有害烏附巴黃之能生人亦能殺人人皆知之至於阿片之毒人則知之者鮮焉豫近閲大永醫話曰凡中阿片毒者必昏宜急用砂糖泡湯頗服不可不知也痘瘡序熱發搐小兒痘瘡序熱搐搦上竄不省人事者誤認為驚風而灸藥兼施則此雖誤治不害於發痘若以驚風為痘瘡而與藥則變症蜂起矣痘瘡候必面色緣緣赤自汗出而眼中含淚是也不可不詳察也眼珠出入人有九竅而口眼及前陰後陰則能開合焉鼻則能動搖而不能以開合焉耳則開合動搖俱不能焉是為之人之常也至若夫諸獸之搖耳象之役鼻蟹之臥起眼珠則是人之所不能也而在夫畜類亦能彼而不能此者則其所受之性各異殊也矣甲州有一漢年二十五其眼珠出入者猶龜鱉能出入其頭然矣寬政壬子歲都下狡獪兒誘彼以歸遂開場於城東堺街戲場傍乃植招牌延觀者觀者蜂屯余亦往觀之彼不論眼左右自以指按眶則卒然只珠突出一寸許乃取一小俑置於眼珠上以能舞之次冒鬼頭假髻於頭頂復駢出雙珠乃為魑魅罔兩而奮起跳躍須臾不觸手而復眼珠於本位矣夫人微塵入眼內尚且痛不可忍而況載物於眼珠上以舞之乎昔阮籍能為青白眼而人以為奇焉今使眼珠出入如意者人之所不能為而彼能為之則是亦稟異氣而然者歟非邪是豈不奇中之最奇者乎嘗覽篁南江名醫類案一人眼珠垂下至鼻大便血出名肝脹用羌活水煎服愈此是以涉疾病乃費財貨以望醫藥今此一漢以眼珠出入如意乃博諸人之一笑以日得數千錢嗟乎疾病與稟異氣之間亦豈非大懸隔者哉取瘤妙法瘤有痰瘤有氣瘤而痰瘤搖之則根與肌肉相離肉瘤則反之故痰瘤可取而肉瘤難取焉取痰瘤之法不拘其大小先以三稜針刺瘤頭一分許乃以礬石瓜子大入針痏另法礬石末打米糊和調貼瘤周圍以紙蓋之須臾以手搖瘤則當針痏白汁出乃以濕紙拭去所貼礬石再以礬石一二錢入盞內水解開如稀糊以雞翎塗之瘤上數十遍半日許而脫去如神

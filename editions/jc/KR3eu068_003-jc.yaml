body:
  text: 下卷痘瘡倒靨及痘後內障奇方痘瘡有順逆險三候其順症者不藥而愈陰症者醫治而可免死至逆候則雖專門神手不過徒指其死期之日而束手待斃悲夫予頃閱齊東野語載用狗蠅治倒靨方是痘家書中所未嘗見者曰小兒瘡痘固是危事然要不可擾之嘗見趙賓暘曰或多以酒面等物發之非也或以消毒飲升麻湯解之亦非也大要在固臟氣之外任其自然耳惟本事方捻金散最佳又陳南劍剛翁云痘瘡切不可多服升麻湯只須以四君子湯加黃耆一味為穩耳二說皆有理然或有變證則不得不資於藥癸酉歲兒女皆發痘瘡同僚格蒼陳坡老儒也因言向冬教三山曰其孫方三歲發熱七日瘡出而倒靨色黑唇口冰冷危證也遍試諸藥皆不效因乞靈於城隍廟以卜生死道經一士門士異其侵晨倉皇因遮扣之遂告以故士曰恰有藥可起此疾甚奇因為經營少許俾服之移時即紅潤如常後求其方甚秘惜之及歸方以見贐其法用狗蠅七枚狗身上能飛者擂碎和醅酒少許調服蠅夏月極多易得冬日則藏於狗耳中不可不知也既而次女瘡後餘毒上攻遂成內障目不辨人極可憂遍試諸藥半月不驗後得老醫一方用蛇蛻一具淨洗焙燥又天花粉等分細末之以羊子肝破開入藥在內麻皮縛定用泔水熟煮切食之凡旬余而愈其後程甥亦用此取效真奇劑也捻金散本事方治小兒麻豆瘡欲出渾身壯熱情緒不樂不思飲食服此可內消仍令瘡無瘢痕紫草茸升麻糯米各半兩炙甘草一分上粗末每服四錢水一盞煎至六分去滓溫服並滓再作一服此療瘡疹奇方升麻湯四君子湯並見諸方書不錄於茲治疣神方疣雖是小恙至其蔓延則雖容顏如毛嬙西施亦有其䫏醜言極醜似無鹽女子焉是以錄經驗數方使閤中患之者得歡心矣治疣神方屢試驗蛇蛻不以多少滾湯浸頻浣患處即瘳又方治疣蔓延者以活蛞蝓一個轉擦疣母上著黏訖乃放棄則其疣自脫其他子疣尋愈又方薏苡仁二錢甘草一錢以水一盞半煎取一盞溫服四五日而疣如拂一方無甘草用大腹皮亦妙又方將茯苓三錢水煎溫服數日而自痊凍瘡妙方凍瘡大人患之者甚鮮而在幼者最多此疾遇冬天則發於手足與耳朵後世謂之寒瘍或名凍風又發跟曰凍跟發耳曰凍耳其初起赤斑漸而微腫得溫則瘙癢殊甚若失治久不痊則變紫黑色而遂潰爛發膿重者穿肌肉方其瘳為瘢痕如湯火傷瘡甚者耳朵墮落矣前哲治法有碧玉膏獨勝膏等予家傳一奇方方未破時與之百發百中應效如神方名掃凍煮散土茯苓二錢乾薑一錢上二味細銼盛絹袋嚴醋蘸上火乘熱熨患處日三四次輕者二三日重者七八日不潰爛而全愈取雞眼子妙術雞眼子生手足心是亦微恙雖然妨乎把握害乎步履焉世俗治之率皆灸患處或又以針穿之乃傅銅綠丹礬之類然是皆足取一時快而根治則難矣余嘗得一奇祝累試累效其法以粳米一粒無瑕者安眼子上以小刀或針向米上空書十字凡三遍書訖急以刀鋒刺席然後可放粳米於瀆水中至米化為水而眼子自失去此又不可以理測者也近覽乾坤生意載雞眼藥三方因抄出而舉於下方雞眼藥水銀乳香沒藥各等分麝香少許先用刀修去雞眼將血見愁搗爛成膏入前藥末少許同敷於患處絹帛縛定又方用血見愁敷之亦妙血見愁即地錦知足齋德本十九方引湖南稻葉克子念者初遊浪華受業于吉益東洞門人某喜萬病一毒說好用峻藥資性魯直不見容世或在都下或在山野亦數破產遊歷四方而為業矣寬政壬子歲自相州鎌倉移往甲州郡內客於桂林寺此年五月與里人俱登富士既至山麓則土人見克之佩刀曰凡登此山者皆解刀留此請須托我輩克作色曰我舊武人子何敢解刀邪遂登山顛極眺望稍下而憩沽酒取微熏興趣勃然至第六合四十里為一升十折為一合與同遊俱取先導所齎之大草鞋著之將自沙拂下回馬而此阪繩路一條直下十有餘里當其下則細沙亂石隨步而崩後人之足在前人之肩魚串而下故欲止不能一瞬之間忽到山麓而克獨中途失道陷大澤中才出四顧則不見人家惟澗水琮琤若鳴珮環青樹翠蔓廕庇蓊薈克無奈何獨躊躇於溪邊意祈岳神尋樵路則日漸落西山憂懼之間適遙見一農夫之過克喜大聲呼之語以前事且問回馬道則曰距此三十餘里山路嶮峭岨阨羊腸榛莽蔚塞奚得往焉顧因客佩刀以犯山禁蓋神靈之咎至此極耳請宜謝罪也克乃浴澗水仰岳拜謝數回農夫憐之延造其里之黑川邑令宿一小寺寺僧頗知醫相見互喜遂出一書示克曰此書近邑民家累世所傳即知足齋德本所述也克即讀之則書中所載僅一十九方取之左右主治百病其方簡而不繁峻藥居十之七與世所傳之梅花無盡藏大懸隔而與其所崇之萬病一毒說幾相似克大喜不知手舞足蹈乃謄寫以歸比諸金科玉條矣後遊駿遠之際少試之復來東都以此書為誇具非得方金十星則不敢許傳人予好方技之癖素到膏肓偶聞之雖有意看其書無緣言面既而歷歲余矣近一門人於江戶橋路傍一書肆以青錢二十四文購得一小冊子以致予予覽之則嘗所傳聞德本之書首有稻葉克序以國字書前頃所述之事而歲月姓名下有款識則蓋系克之所自筆卷尾有東洲左潤跋惟恨此書文理不接顛倒錯置亦復不少因改竄潤色其大半使人始可讀之後會左潤言得此書之由則曰曩克於日本橋大路往來偶為攫客所奪夾帒時並失其書云夫德本有名醫之稱人口之所膾炙矣而真書之不顯於世者幾二百年克苦身體忍飢渴偶然得此書以為奇事矣而今予在都下不勞體膚不識其人而自歸我插架者此不亦奇緣乎蓋予生平有意於壽蒼生每得奇方妙藥不獨自秘輒著書以與眾俱焉是以天示我此書者歟予之於克雖未有一面之識未知其為人何如又曷可秘邪因附載於此顯德本之幽光以傳不朽克覽之豈得以予為非哉近甲州門人高木甫齋來予欲使彼歸鄉之次造黑川邑索此書之原本以訂正乃高木生跋陟嶮岨遍歷峽中無所謂黑川邑者矣因至桂林寺詢之寺僧曰德本十九方往年自山梨郡元明傳而為克所奪去云然則克欲使人信而奇其事者歟表證發熱惡風上衝自汗項強頭痛寒熱往來喘急無汗惡寒身疼咳嗽咽痛乾嘔拘急凡脈浮者表症也皆自風寒起當發汗病人發熱上衝頭痛惡寒汗出者或胸以上似有汗者或腹拘痛者或下利者或如瘧狀發熱嘔者發陳湯主之發陳湯茯苓半夏各四分柴胡桂枝芍藥黃芩生薑各三分蒼朮甘草各二分上九味以水二合煮取一合去滓溫服若咽喉腫痛咳嗽者兼用青龍散青龍散治咽腫疼痛咳嗽者或痰喘咳嗽無汗者或胸跳目眩者或咳逆吐食者或咽痛甚吐痰血者茯苓四錢大黃五味子青礞石各三錢甘遂甘草各二錢上六味為細末每服八分白湯送下或作丸用之亦可寒熱往來振振無汗頭項強痛背脊拘急或呼吸促迫身體骨節疼痛者或咽喉喘鳴咳者並與榮陽湯主之治瘡家骨節疼痛或寒慄者此方與救疝飲和服時時以瀉心丸下之若風濕骨節疼痛者亦宜以此方和救疝飲若喘息胸滿或咳喘久久不愈者此湯及直行丸永服斷根本榮陽湯葛根芍藥麻黃桂枝杏仁附子甘草各二分生薑三分上八味以水二合煮取一合去滓溫服如惡寒身體骨節疼煩者和救疝飲與之如口舌乾燥者兼用平陽丸凡大便硬而煩者兼用解毒丸救疝飲治中風風濕痛風風痹疝氣腰痛腹痛等症又半身不遂口眼喎斜或語言蹇澀者和發陳湯服若不大便者兼用解毒丸又寒疝腰痛淅淅惡寒或大便閉結或瀉下或腹滿痛按之反不痛者或胸痹心痛者或胸腹疼痛惡寒戰慄者及腹鳴寒痛手足逆冷者並此方主之又淋疾久不差腰痛者和清濟子服時時以玉丹下之茯苓芍藥各八分鬼縛四分甲州方言屋暱貲跋慄此品華名未詳蓋瑞香之類白朮六分附子二分上五味以水二合煮取一合溫服容平丸口舌乾燥渴欲飲水胸腹疼痛者此熱痛也宜此方若甚者和解毒丸等分石膏五錢瓜蔞根三錢甘草黃連各二錢上四味為末打米糊丸梧子大解毒丸治胸痹心痛或噦噎腹滿按之痛大便閉結或下利臭穢或面色如醉言語錯亂者若發狂者此方順氣丸各一錢和服後與瀉心丸如嘔家胸痞心煩者和理中丸如吐下止而煩者及熱在裡心中悸動煩躁不能眠或胸痛肩息苦煩並容平丸和服如黃疸病腹滿心悸大便硬者兼用瀉心丸如黃病無餘症者磁石丸和服如積聚家胸煩心下痞硬噯氣者及大便硬煩者並瀉心丸兼服如飲食不下咽者以生薑汁送下此丸大黃三錢黃芩黃連各二錢山梔子一錢上四味為末打米糊為丸里證潮熱秘閉黑胎譫語發熱無寒胸腹滿痛下利臭穢大渴煩躁自汗惡熱凡脈沉數者是里症也若身厥冷欲除衣者熱入骨髓也病在裡者無寒時熱或腹滿按之痛或大便秘結或下利臭穢或面色如醉譫語發狂或舌胎黃黑者是宜順氣丸解毒丸和服後當以瀉心丸稍稍下除熱順氣丸大黃芒硝各等分上二味為末打米糊丸瀉心丸治結毒骨節疼痛者熱在裡腹痛者諸毒停滯胃中胸下苦悶者魚毒菌毒之類天行痢疾用此方腹痛止者宜用禹餘糧丸凡諸病用對症藥後少用此方取快利發狂者隨症與藥後互用此方及玉丹而可又治痘瘡麻疹熱毒甚者又朝食暮吐者用此方若結實不去宜與玉丹又赤白惡毒痢藏府撮痛者先用順氣丸時時以此方下之結毒筋骨痛者本方最妙大黃四錢白礬二錢輕粉鼠酒各五分即巴豆上四味為末打米糊為丸如熱在胸腹舌燥好飲水者容平丸解毒丸兼用邪氣在半表半裡者必寒熱往來發陳湯順氣丸兼用凡里症汗多者容平丸順氣丸痰證喘鳴咳嗽懸飲掣痛頭眩咳逆大熱惡寒吐痰咳嗽者宜榮陽湯無汗發熱咳嗽吐痰或心中悸目眩者宜青龍散或面目浮腫或痰飲盛者將青龍散兼服直行丸如咽喉如鋸聲每咳自胸背引小腹痛或手足攣痛者直行丸主之如咳逆吐食或咽痛甚吐痰與血者宜青龍散如喘而迫胸膈或咳嗽久不愈者以榮陽湯兼服直行丸久服以斷病根直行丸治痰喘咳嗽頭眩嘔逆懸飲掣痛結胸胸高起心腹疼痛甚者手不可近水腫咳嗽等症其他風濕痛風骨節疼痛及痰飲變成諸症者悉能治之大戟大黃各一錢牽牛子五分芫花甘遂各五分上五味為末稀糊丸每服二三十粒心痛胸痹結胸腹痛心腹疼痛舌乾欲飲水者是熱痛也宜容平丸胸硬高起痛手不可近者是結胸也直行丸主之胸中寒有凝痰宿飲而痛者是胸痹也理中散主之腹鳴寒痛手足冷者是伏寒也救疝飲主之腹拘攣而痛者是外邪也發陳湯芍藥散和服熱在腹裡疼痛者宜瀉心丸但腹中拘攣滿痛者宜與芍藥散如好甘者以甘草膠飴煎汁和服尤妙如心腹疼痛諸藥不效者宜兼施直行丸心痛徹背背痛徹心冷汗出而脈結氣息欲絕者以甘草湯送下理中散尤妙也理中散治溏泄腸鳴胸下痞硬小便不利者若下利不止者與禹餘糧丸又治淋家腰腳冷小便頻數及尿蓐如小便利後莖中痛者兼用清濟子又癲癇症世皆以為難治是水毒變病也以此方及疳蟲丸久服則無不悉愈者茯苓五錢人參蒼朮各三錢桂枝乾薑甘草各二錢上六味為散服芍藥散腹中拘攣痛者是外邪也宜發陳湯芍藥散和服又天行痢無餘證者此方及順氣丸芍藥香附子各三錢厚朴白朮甘草各二錢上五味為散服或水煎亦可也食毒宿食吞酸酒毒飲食停滯而噯氣腐臭者宜理中散大便硬者與解毒丸停酒亦宜用解毒丸魚毒菌毒停滯胃中胸下苦悶者宜以瀉心丸下之諸食毒在胸腹不消化疼痛甚悶亂欲死者急與玉丹以取吐瀉為妙玉丹治胸腹劇痛躁擾悶亂或角弓反張欲卒死者又卒倒不省人事者及小兒驚風其他瘡毒淋疾痔疾脫肛下血癖積等及諸般實病當審其輕重淺深每服一二分漸加至一錢取下惡物水銀鼠酒各五分大黃三錢黑鉛乾生薑各二錢上五味為末打米糊丸附方黑丹原無方名元周定治水病身體洪腫小便不利百藥無效者水銀黑鉛鐵砂各等分上三味為末打米糊為丸周按即局方養正丹以辰砂換鐵砂者耳嘔吐反胃諸嘔吐之證胸下痞硬或小便不利而吐逆者宜與理中散若嘔不止者以生薑自然汁服之如發熱而嘔吐者於發陳湯方內加生薑一錢如飲食停滯心下而疼痛或朝食夕吐者宜以瀉心丸下之後以理中散調和中焦凡嘔吐之證心煩胸痞大便硬者解毒丸理中散和服如結實者與玉丹噦噎噦者宜服解毒丸如胃中虛寒噦者以理中散熱湯攪調服之並皆將清濟子米糊和調貼足心或灸臍中亦可也如噎飲食不下咽者以生薑汁送下解毒丸清濟子見水病痢病泄瀉熱利腹痛裡急後重下赤白汙濁者順氣丸兼與瀉心丸漸漸下之可也病輕者宜解毒丸天行疫痢初得發熱頭痛惡寒下利澀滯者發陳湯順氣丸兼服如大便澀滯肚腹拘攣無餘症者芍藥散兼以順氣丸凡痢疾宜先以瀉心丸瀉熱毒腹痛澀滯止後當以禹餘糧丸止之泄瀉溏泄者胸下痞硬腹中雷鳴者並宜與理中散如不止者兼用禹餘糧丸痢疾下血不止者禹餘糧丸最妙禹餘糧丸治邪在臍下按之濡而痛者及下利便膿血者又治臍上臍下臍傍皆痛者禹餘糧赤石脂代赭石各二錢將軍四錢上四味為末打米糊丸痔疾脫肛痔疾之為病濕熱鬱蒸釀成者多宜以救疝飲兼用順氣丸逐濕熱除瘀血脫肛下血者宜禹餘糧丸凡濕瘡瘡毒痔疾下血脫肛之類久不愈者並用治瘡丸一劑更與玉丹取瀉下則必愈而不復發治瘡丸治瘡毒家及無名惡毒腫神方也宜與瘡毒門參看龜板辰砂大黃各四錢輕粉五分上為末米糊丸痲疾痲之為病欲小便滴瀝澀痛難忍或出膿血是也宜用清濟子久痲有畜瘀而小腹拘痛小便頻數或尿血者當歸散清濟子間服可也如大便結燥甚色黑者兼用順氣丸痲疾久久不愈腰痛而時寒慄者救疝飲清濟子和服猶不愈者為有瘡毒宜間以玉丹下之如腰腳冷而小便頻數時睡中遺尿者宜理中散得小便快利後陰痛者兼服清濟子清濟子防己白朮商陸滑石各二錢甘草二錢上五味為散每服一二錢日三服瘧疾五瘧當發其邪宜發陳湯大渴者兼以容平丸大熱譫語者兼用瀉心丸咳而引胸中痛者兼用直行丸凡瘧疾久不愈者有用疳蟲丸取下蟲而愈者霍亂霍亂之為病發熱惡寒嘔吐而利咽喉乾燥或渴飲水而吐手足逆冷小便不利或發熱腹痛手足痿弱此症皆宜用理中散發陳湯如吐利止後心煩者解毒丸平陽丸兼服渴飲水小便少者是消渴也理中散容平丸並用虛煩煩躁熱氣入內胸跳難眠或胸中痛舌上黃黑呼吸促迫動肩者宜解毒丸容平丸並用如熱實於裡苦楚煩躁呻吟動鄰者宜以瀉心丸下之上衝眩暈眼耳口舌眩暈者理中散或發陳散眼耳口舌病皆上衝也發陳湯解毒丸並用可也五疸黃疸病汗染衣者發陳湯兼以磁石丸如心煩者宜兼用解毒丸如遍身黃黑腹脹大便黑時時下利者磁石丸順氣丸並服如不效者當用清濟子如腹滿胸跳大便硬者解毒丸瀉心丸兼服如渴欲飲水而小便不利者容平丸解毒丸兼服如五疸難別久不差者宜磁石丸解毒丸和服如汗出者與瀉心丸以少少下之疝氣惡寒厥冷腹痛腰痛大便閉結陰囊縮小大便溏泄寒疝證振振惡寒腰痛便閉或瀉下或腹滿㽲痛按之不痛者宜用救疝飲如上衝頭痛惡寒身體骨節疼痛者宜發陳湯救疝飲和服如發熱經日不解舌上黃黑小腹㽲痛按之愈痛者宜用瀉心丸腫滿水腫鼓脹鼓脹者身體瘦而腹獨脹滿宜常用磁石丸時時以瀉心丸及玉丹下之水腫者當發汗利小便宜榮陽湯和清濟子若咽中乾者間下容平丸凡水腫咳嗽者當以直行丸下之身體黃腫者宜磁石丸磁石丸治遍身黃黑肚腹脹滿大便黑時時下利者與此方兼以順氣丸浮石三錢磁石二錢滑石三錢大黃四錢上四味為末打米糊丸五癪六聚癪者積也水穀之毒皆成積聚也心下痞而痛或小便不利飲食無味口吐涎沫者宜理中散如胸腹疼痛甚者可用芍藥散如胸中煩而心下痞硬或噯氣不除者可下解毒丸如有積塊或血癪而大便色赤黑者宜與順氣丸所謂疳積心氣不定者其狀殆如驚風是也宜疳蟲丸如卒倒者宜急用玉丹如身體浮腫色青黃荏苒久不痊者宜磁石丸凡大便硬而煩者當用解毒丸瀉心丸中風風痹風濕痛風半身不遂口眼喎斜攣引者發陳湯對救疝飲煎服若大便秘者更下解毒丸風痹亦同風濕之病身體骨節悉痛者榮陽湯對救疝飲煎服若咽中干而渴者更下容平丸大便硬者下解毒丸若痰飲咳嗽者兼用直行丸痛風亦同治產前後經閉血塊半產漏下痛衄血吐血男女諸血證孕婦產前常宜服當歸散如產前大便硬者間致難產宜當歸散下解毒丸如產後血暈及胞衣不下者又月經不順或有血塊下白物者並皆同治法半產及漏下不止者以當歸散溫酒調下凡男女諸血症宜當歸散解毒丸兼服當歸散當歸芍藥各三錢芎藭牡丹皮甘草各二錢茯苓四錢上六味為末小兒五癇驚風小兒病多難辨別然癇證最居多常宜用疳蟲丸以是治百病奏功者過半矣又驚風發熱手足動搖筋惕肉瞤者屬發陳湯症用此兼下疳蟲丸可也如角弓反張欲卒死者宜急用玉丹凡小兒素有胎毒加以飲食過度因循而食與毒停畜而成病者宜時時以玉丹下之疳蟲丸木鱉子大黃各三錢藜蘆一錢五分上三味為末神麯糊為丸黍米大癲癇此證世為難治然是水毒之變病也理中散疳蟲丸交久服而全愈瘡毒家諸腫毒頑瘡無名惡瘡俱皆宜排膿散熱甚者發陳湯惡寒甚者救疝飲須量病熱兼用解毒丸瘡家用諸藥無效者用治瘡丸一劑繼以玉丹下之其他諸惡瘡毒結毒等醫治無驗者治瘡丸尤神效如瘡毒入里骨節疼痛或振振惡寒者宜救疝飲榮陽湯間與玉丹以取下必愈排膿散反鼻鹿茸各二錢鼴鼠二錢土茯苓五錢上四味為散發狂發狂者宜玉丹瀉心丸如口舌乾燥者容平丸解毒丸兼服如病勢盛者以甘草湯煎汁下容平丸數錢如大便漆黑者宜用順氣丸痘瘡痲疹初起宜用發陳湯瘡已出者兼用解毒丸皆當從外證求治方熱毒甚難救者與瀉心丸瘡黑陷者以蘩蔞自然汁下治瘡丸眼疾眼疾有顓科而先哲既備載各冊或為一百六十證或為七十二證以論之獨明傅仁字著審視瑤函定為一百有六證而其所論按候察法覽形辨色詳悉無遺又鉤割針烙之治藥劑補瀉之法縷晰森森以鏡其要業斯道者不可不讀者也在本邦亦精其治術者往往有焉或針瞳子而出膿或刺眼胞而放血或浸銅器於鹽湯以熨眼內或灸眼珠等之事最能工其術有志之士宜就而學焉余非專科則未敢究其術今舉所經驗方一二以與眾俱云加減四物湯目疾外障通治之劑當歸川芎芍藥薄荷荊芥菊花白芷細辛黃芩各中甘草下上十一味水煎溫服洗眼方荊芥防風蔓荊子菊花紅花薄荷各等分上煎湯先熏後洗掃紅煎出蔣示吉通醫外治治時眼紅腫痛爛方見產科發蒙四卷眼胞麋爛甚者加艾葉菊花其效如神木賊煎小兒胎受熱毒生下兩目不開者此方神效見丹溪醫案燈心黃連木賊秦皮棗肉各五分上以水二盞煮取一盞頻頻洗之乃開明目膏治一切目疾赤腫疼痛羞明難開者又小兒初生眼胞脹起閉而不開者點藥於筆頭入眼內則二三日而必效但要入藥於深淺則無效硼砂海螵蛸爐甘石各十錢龍腦一錢辰砂八分上乳缽內細碾數千遍用煉蜜半兩復碾勻為膏以少許點入眼角緊閤眼而睡著極妙若癢甚者加枯礬少許灼明煎治諸般眼疾赤腫生胬肉疼痛甚者神效膽礬下白礬下芍藥中黃連中杏仁中蔓荊子中荊芥上上煎湯頻熏洗累試累效撞刺生翳或刺痕傷損血流出遂生血翳或疼痛難忍者宜用茺蔚子散外以茗石散點眼內殊效茺蔚子散茺蔚子防風川芎玄參桑白皮桔梗知母藁本白芷各一錢細辛半錢上每服三錢水煎溫服如熱甚者加大黃芒硝痛甚者加香附子茗石散天石二錢蛇骨二錢虎肉一錢半蘘荷根搗取汁細絹濾淨日曬乾一錢醫家名曰茗石上極細末乳汁和勻入眼內洗爛弦風赤眼方審視瑤函其效如神此藥人家不可少無目病則以施人價廉工省濟人甚便苦參四錢五倍子荊芥穗防風黃連各三錢銅綠五分上為細末外以蘇薄荷煎湯丸如彈子大臨時用以熟水化開洗眼每日三次立愈神效全目飲石室秘錄目痛常治方白芍三錢白蒺藜二錢甘菊花當歸柴胡荊芥防風半夏各一錢甘草五分梔子二錢上水煎服二劑即愈若不愈宜舍常而思變也乳香定痛散乾坤生意治暴赤眼疼痛不可忍者初發眼後用神靈散鼻內吹當歸川芎芍藥草龍膽細辛漢防己各等分一兩乳香半兩別研上㕮咀每服五錢水二鍾煎至一鍾去滓溫服神靈散焰硝二兩黃丹五錢雄黃三錢沒藥乳香各一錢上為細末口含水用管鼻內搐之升麻葛根湯李東壁云治陽氣鬱遏及元氣下陷諸病時候赤眼每有殊效周嘗治時候赤眼寒熱頭痛者加菊花細辛多取奇效分心氣飲加菊花治婦人諸氣不和經行不順微惡寒眼赤爛者八物湯加菊花夏枯草蔓荊子治內障久服見效明目地黃丸治腎虛目昏熟地二兩山藥山茱萸丹皮歸尾五味子柴胡各五錢茯神澤瀉各二錢半上為末煉蜜丸硃砂為衣梅瘡餘毒攻眼清上丸治瘡毒害眼者竹茹二錢輕粉一錢大黃黃連黃芩各二錢上為末糊丸赤小豆大辰砂為衣每早午時黃昏空心並以十五粒白湯送下敗毒散倍薄荷加天麻治濕毒侵眼生赤脈白瞖胬肉或疼痛者內疏黃連湯審視瑤函治諸瘡毒皮色腫硬發熱作嘔大便結而脈洪實者攻及兩眼或一目赤痛紅腫並治黃連炒梔仁黃芩當歸身桔梗廣木香檳榔赤芍藥甘草蘇薄荷各八分製大黃連翹各錢二分上銼白水二鍾煎至八分去滓食遠服還陰解毒湯同上治梅瘡餘毒未清移害於肝腎以致蒸灼神水窄小兼赤絲黑白混濁不清看物昏眊不明當歸酒洗川芎生地黃金銀花去葉連翹黃芩酒炒各五分黃連酒炒苦參各一錢土茯苓細甘草各五分白芍藥酒洗麥門冬去心玄參各一錢上銼劑白水二鍾煎至八分去滓溫服澤醫治烏睛生白星一老嫗曰妾壯歲患眼疾逮內外施治痛楚一定忽烏睛生白星累月不去百方無效有一澤醫教曰以兔屎細末盛青絹袋熱湯浸頻頻熏洗之則當失矣乃如法行之而全愈予頃讀審視瑤函曰廣陵甘棠鎮王海明子痘後睛珠突出偶一客見之告曰此目有一藥可治不知能得否詢之乃胎兔也其父遍覓得之按方炮製藥盡而目收余推幼幼之心故廣其傳周按古方有兔血丸兔頭煎湯皆稀痘妙藥又本草引藺氏經驗方云治痘後目翳用兔屎二七枚以雌雄檳榔各一枚同磨井花水調服百無一失云云夫兔屎治目疾如此因並記風眼經驗方風眼初起疼痛太甚脈浮大有力先與荊防敗毒散次宜用防風通聖散主之或將紫丸取一下須臨證消息矣又有淋疾熱毒上攻發於眼目者其證與風眼一般但脈沉為異也宜以防風葛根羌活之類為主若誤用防風通聖散等瀉下之劑則必失明慎之痘毒入眼治痘毒入於目之法痘科諸書詳載之亦何贅矣然予有一訣凡痘當灌膿收靨之時眼一旦開而復閉者必毒害乎眼也此症淚自溢出者不失明矣若干枯無淚者多致失明矣治之之法外宜以柳蠹蟲數個擂如泥絞取汁頻灌眼內別以白芥子散貼足心內宜服清上防風湯兼用望月砂散兔糞丸百發百中累試累驗白芥子散白芥子上阿膠下上研細末米糊調毒入於左眼者貼右足心入於右眼者貼左足心七八日而必效清上防風湯防風黃芩黃連梔子桔梗白芷枳殼荊芥連翹薄荷川芎甘草上十二味水煎或加兔屎望月砂散穀精草蜜蒙花蟬退去翅足各五錢望月砂炒一兩上為細末每服五分白湯下兔糞丸兔糞炒乾為末蜜丸綠豆大每服二三十丸酒下眼胞痰核丹溪心法曰眼胞痰核結於上下眼胞皮里肉外其形大者如棗小者如豆推之移動皮色如常硬腫不疼由濕痰氣鬱而成外用天南星蘸酢磨濃頻塗眼皮日數淺者即消日數深者雖不能即消常常塗之塗令皮薄微微剝損以手指甲擠出如白粉汁即消黴瘡經驗治方余曩著黴癘新書已布於世距今十餘年其間經驗頗多因採摭以舉下方凡患下疳便毒者其脈必沉細也便毒發於右則右尺脈沉細也發於左者左尺脈沉細也凡疳瘡以不痛為常為易治痛者為變為難治龜頭或稜後發瘡其形圓凹而淺者易治又自稜後凹處引莖發瘡形細長而淺者次之又瘡發稜後凹處回莖橫長者腐潰速而逆證也邦俗謂之劊首下疳黴瘡痛甚者用通聖散加苦參一錢外以蘗膏散敷患處一日而痛失如神內經諸痛為火故以寒藥收效黴瘡發遍身者宜浮萍通聖散兼用沉香化毒丸即瘥如發砂仁瘡者卻不易治宜用加減化毒丹疳瘡腐爛色赤中心稍高起者以浮萍通聖散合大黃牡丹湯主之兼以沉香化毒丸一錢二分冷水吞下如疼痛者貼當歸膏如膿汁出多者貼辰砂膏如痛甚者用通聖加苦參湯如前法或以黃柏石膏鉛丹各三四錢水煎候冷盛器蘸陰莖其效如神結毒筋骨疼痛者與沉香化毒丸歷五日而痛益甚者其愈必速也十日許而安如歷五六日依然而疼痛如故者其愈必遲不歷二旬許則不見效下疳黴瘡腐爛積月累歲不差者宜與加減化毒丹一種有陰莖皮弛裹稜不脫稜後凹處潰爛莖皮腫起馬口膿出邦俗謂之囊下疳又龜頭潰鑿漸漸延及於莖潰爛不止者世亦謂之蠟燭下疳即蠟燭發又咽喉潰爛或穿孔者謂之喉穿即喉癬並皆重若莖中痛甚者尤重非用大化毒丸則不能奏效也然此證甚稀患黴瘡下疳瘡者誤早服輕粉粉霜後變致頭痛或耳鳴等症久久不愈者宜拔毒丸方見黴瘡秘錄服加減化毒大化毒等丸者當大便日二三度下利此為常候或歷四五日猶秘結者盡亦有焉不可慮必當忽然下利七八行來得下利則須知其愈在近也病者已服輕粉口舌糜爛者以雞卵一枚碎攪化含嗽若重者以柘榴皮三四錢水煎頻頻含嗽必愈便毒初起者宜用牛蒡芩連湯有神效結毒筋骨疼痛者將防己排毒劑下二葛四黃散屢有得奇效浮萍通聖散即防風通聖散加浮萍一錢方見黴癘新書蘗膏散治黴瘡下疳疼痛者黃蘗石膏各等分上細末敷患處沉香化毒丸治一切黴毒下疳及筋骨疼痛沉香大黃人參各一錢黃蘗一錢五分芽茶五錢半甘草五分枯礬二錢七分五釐白丹砂擦破三分作臼四分筋骨痛五分此分兩一大秘事上細末打米糊丸赤石脂為衣每服一錢二分冷水吞下重者漸加至二錢禁鳥魚獸肉麵條油膩糯糍果物蔥韭牛蒡雞卵豆腐飲酒房事等件加減化毒丸牛黃丁香豬芽各一錢琥珀鬱金各二錢硃砂雄黃乳香亂髮灰白蘚皮穿山甲各三錢製大黃四錢白殭蠶八錢生生乳一錢上為末用神麯末五錢打稠糊入藥搗勻丸如梧子大硃砂為衣每早空心服七分以人參末三分白湯攪勻以是送下每晚空心服三分以人參末三分送下如上法此方骨痛者無效驗唯用腐爛數月者尤有效當歸膏治腐爛疼痛者清血熱又治灸瘡當歸地黃各三錢白蠟七錢麻油四錢以當歸地黃入麻油中鐵銚內煮候歸地枯浮油麵去渣下白蠟溶化將細布濾去滓聽用辰砂膏性冷治疳瘡拔濕毒止水汁多出去血熱甚妙黃蠟四十錢椰子油十錢豬脂十五錢麻油夏四十錢冬五十錢上四味以文武火煮片時細布漉去渣更將血竭七錢鉛丹四十錢辰砂三錢極細末微微加攪和貯磁器聽用大化毒丸即加味化毒丹用白丹砂二錢加人中白神水金頂砒宜與黴瘡秘錄參看牛蒡芩連湯治魚口便毒如神黃芩酒製黃連酒製各二錢半桔梗石膏各一錢半連翹玄參牛蒡子炒各一錢大黃酒荊芥防風羌活各二分甘草一錢每服四錢加生薑三片水煎服或加奇良二錢防己排毒劑治結毒筋骨疼痛不能步履者茯苓獨活上桔梗川芎中枳實中柴胡中防己上甘草下生薑下以水二合煮取一合溫服二葛四黃散見黴癘新書此方治結毒筋骨疼痛之神方然數日與之則以口中糜爛患者或畏之是以用此方三日後間服通聖散末二日而復與此藥則無有口中腐爛之患矣凡用化毒丸之類亦復然但將通聖散作丸耳此一大秘事不可與俗人語也制生生乳簡便法黴瘡秘錄所載制生生乳法中曰羊城礶曰八卦爐之類不能詳何形狀又雖言三香足離火其香之長短大小亦不可知且至於微微擦水於盞底等事人往往不堪其煩曩門人今村子正瞭解簡便製法予依其法甚易易今錄於茲以示初學煆煉礜石下二錢綠礬十二錢雲母二錢五分盆硝十六錢朱汞九錢六分食鹽十五錢枯礬五錢六分青鹽三錢五分上件共研不見星入磁器密封二十日取出入磁爐內貧家所用價賤者佳俗言斯鴉吉訥非乙列上火藥化為蟹目沸則以箸攪之不可止手俟其凝結乾燥離火候冷用小新土器密蓋收艾炷者世俗言灸瓦此物大抵與煙爐口相侔以紙捻或麻線札定如十字樣次以麵粉雞子清和調為糊以是固濟縫合處待乾倒安大磁盆之中心邦俗所稱之手水缽也口寬尺許高七八寸者妙乃加灰於四圍與磁爐底平等又另於矮坐洗盆內邦俗所稱手水盤盛水三四寸乃安置磁盆於其心以浸底於水中與陳氏微微擦水於盞底者同意然後熾炭置磁爐底先用文火漸漸加炭用武火二三香足用尋常香黃土色者離火先用甘草牙皂各二錢濃煎汁收別器以之灌瓦器底埋土中一日夜取來發開則白丹砂在瓦器底裡如束針之狀依陳氏法以白丹砂厚紙包裹浸甘草牙皂煎汁片時取出埋土中三日夜取來曬乾亦可取來每兩加冰麝各七釐辰砂九分共研極細處用乳香一錢二分滾水燉化和前末研勻為丸每重一錢一分外以黃蠟封固即名生生乳夫陳氏製法取白丹於上此法取於下其法雖殊理則同學者宜察焉諸家經驗方予好醫方之癖聚諸家所經驗之秘方無慮數百今舉其一二以示同志君子神仙百中散治紫赤黑白癩疾百發百中屢經驗無比神方非其人勿傳人參白蛇烏蛇血竭真珠各六錢上為細末日用一泉加金粉二分白湯送下更吞大楓子丸大楓子丸大楓子十七錢上為末米糊丸無槵子大日用三十粒兼用白丸利腸胃白丸方巴豆四錢去皮膜入缽乳內擂如泥上米糊丸作四枚濕紙包裹煨以紙微焦為度用法壯者一日用四丸弱者用三丸其欲用之則先斷鹽二日而早辰頓服當大便屢下利若利下不止則宜以味噌汁及白粥冷食即止震靈丸治癩疾之神方大楓子去皮五十錢天石五錢大黃黃蘗各五十錢荊芥爐甘石各三錢瓠瓜燒存性山櫻皮燒存性各一錢五分上八味細末為丸分作丸十丸壹粒重一錢四分日服三粒白湯下凡服此丸至十日則臨臥宜服金聲散金聲散大黃十錢川芎八錢蕎麥五錢上細末臨臥以一錢半溫酒送下次早宜下玉振丸玉振丸白醜木香川芎各四錢巴豆二分半乾薑一錢半上為末薄稀糊丸梧子大第十一日臨臥以五分白湯吞下與此丸之日不可服震靈丸崎陽一瘍醫某授其所秘之膏藥方於余甚簡易且不用獸脂余屢試應效如神不忍自秘乃錄以弘傳雖非瘍醫家家制以常貯宜臨時施之跋日慄膏不論癰疽發背一切腫瘍貼之聚毒化膿尤神妙已潰膿者吸膿生肉而腫自愈瀝青五十錢宜用紅毛產黃蠟十錢冬月用七錢麻油一合先煮麻油片時許挑貼紙以不暈為度乃下黃蠟瀝青令溶化攪轉用細舊絹濾淨納貯瓷器隨見症宜加減欲令腐潰則加巴豆膽礬銅綠痛甚者加乳香沒藥瘙癢者加枯礬潰後不肉起者加木乃伊新肉漸長腐肉未盡去者以干膚刺膏等分和勻腐肉漸去新肉已長而猶不斂口者加輕粉瘡久不潰欲為內攻者加失貲必兒末遏篤少許千膚刺膏貼諸瘡止痛散血熱治丹毒打撲五痔白蠟二十錢白麻油一合龍腦粉錫各四錢先以白薔薇花四錢半浸麻油中一宿乃上火煮片時濾去滓入白蠟將柳木篦攪轉須溶化下火再濾淨更入粉錫龍腦又攪轉納貯瓷器鴉僕斯膏治下疳漏瘡久不斂口其他瘡瘍荏苒難瘳者松脂四十錢沒藥八錢銅綠十七錢乳香十錢密陀僧八錢麻油六十錢黃蠟五十錢豬脂四十錢米醋一合上前五味極細末先將黃蠟松脂豬脂麻油文火煮五六沸用細舊絹濾去渣再上火入乳香沒藥減火攪勻須臾入銅綠密陀僧而後入米醋攪轉千遍勿止手蜜乙暱乙膏治諸瘡瘍及濕痰結核筋骨疼痛肩背腰痛鉛丹十二錢黃蠟二十三錢麻油一合上先煮麻油次下黃蠟更入松脂鉛丹攪轉濾去滓再上火然後入少水則忽沸溢如湧再攪轉一爨時候水氣去乃收貯磁罐底野迦真方明艾儒略曰如德亞之西有國名達馬斯谷土人制一藥甚良名的里亞如能治百病尤解諸毒有試之者先覓一毒蛇咬傷毒發腫脹乃以藥少許醼之無弗愈者各國甚珍異之云云曩歲蠻舶齎此藥其效能令痘瘡起脹而此藥近盛行醫俗往往用之眾疾曩予就為阿蘭學者詢此方秘惜不敢傳是故以不能詳其藥性不試之十年所頃一醫生自肥前州來從予受業渠傳其真方於予蓋所得譯司某也今之庸醫未詳底野迦為何物而有漫稱奇藥者豈醫之志也哉因舉於此以弘其傳焉欲令天下人知其配合藥品以臨症用之不誤爾此予之老婆心也蝮蛇去頭尾及皮割腹去腸唯留心與肝洗淨乃石臼內搗爛取起入鍋內以文武火加上下焙乾如作蒸米法俟其稍干復入臼中搗之更加白蜜三倍鍋內炒過而後為細末二十四錢犍地亞捺根草名和蘭本草有大小二種其小者形狀主治與龍膽正同故今用龍膽八錢設獨亞慄乙根草名今換用高良薑八錢的蠟矢及罹怛今以赤石脂代之十六錢安傑慄加白芷屬今代之四錢沒藥和蘭稱印謁孤窒蔑剌者最上好品宜擇用八錢石硫黃明淨瑩徹者八錢泊夫藍四錢或七錢桂七錢或八錢重樓金線和蘭稱設扁蒲蠟獨屋爾的兒此品漢舶雜之甘松或蒼朮中而來蓋以竊斤量爾宜探索藥鋪中以堅硬肥大為佳四錢丁子三錢阿片壓定為扁者佛手柑自然汁各三錢或七錢上十三味除阿片佛手柑汁搗余藥為末而入二味缽內和勻乃將杜鬆糕製法見於後蜂蜜各等分加本劑之量各三倍徐徐加之共研勻如泥令可丸而釜內重湯煮候和下火冷定收貯天明壬寅歲和蘭人入貢有猗瑳迦知心幾者曰此方如法制煉收貯歷一年許而後再煮和勻更妙云杜鬆糕法杜松實和名年詞薩矢即彆僕烏一斤搗細好酒三升內浸一宿次日露器煮取汁主治天行溫疫頭痛發熱能發汗又能益心氣令人安眠或胸膈窒塞怔忡心氣不寧或嘔吐下利及諸熱凶惡證其他疝疼積痛和諸痛解諸毒又用痘瘡令起脹凡熱熾者醋和調服勞瘵初起者用此尤效癲癇瘧疾疫疾熱往來久不止者燒酎或麻油勻塗背奇效疔瘡便毒及螫蟲狗鼠咬傷等亦燒酎解開塗患處亦貼火傷湯泡即效每用一錢或二錢以醋或溫酒送下凡諸邪毒壯熱證其邪火日加者宜和醋與之能折其病勞令其速解散亞爾牟的慄亞加方亞爾牟者言賤也蓋此方以為貧賤者設也月桂用實和名達木或貲詞沒藥龍膽馬兜鈴各十六錢上先以沒藥碎細而下余藥共搗和為末加上好蜂蜜研調上文火煮以木條子攪不可住手俟如膏為度下火冷定密器收貯聽用主治諸中毒或蟲獸諸傷或傳染諸病肝腹疼痛或搐搦拘攣失心顛眩每服小兒自二三釐至一分大人強壯者自一錢至二錢凡天行疫疾瘧疾及一切潮熱或心胸小腹諸痛及便毒並背脊手足硬腫等諸症以燒酎或麻油和勻敷之皆悉有效舌疳妙方金粉散治舌疳如神硼砂七分白檀五分丹砂一錢烏梅五分鬱金七分金粉一錢上為細末分作紙捻六條先入麻油於盞中將一條浸之點火如尋常燈火法另取黑豆三合以水三升煮取二升俟冷定含口中然後嗅煙若豆汁得溫則換之日用二條此方岡本樸仙秘方而上總州圓城良庵所屢經驗予得此方甚艱今不吝秘公之骨骾金鳳散治魚骨骾及行木刺神效方鳳仙草花實莖根俱燒存性青松葉燒存性各等分上細末每服五分溫酒送下此方非但治魚骨骾咽其他竹木金銀銅鐵等刺身體不出者一服見效真絕世神方也東都本街一藥店賣此藥日得數千錢下血塊妙方魁蛤燒上為末米糊丸梧子大每服五十丸數日而當下血若塊減者宜加生蒲黃餌食亦宜魁蛤藕根金瘡鐵扇散洗冤錄治刀石諸傷起死回生神異靈驗難以具述象皮切薄片用小鍋焙黃色以干為度勿令焦龍骨用上白者生研各五錢石灰歷數百年者佳寸柏香即松香中之黑色者飛礬將白礬入鍋內熬透便是松香各一兩與寸柏香一同熔化攪勻傾入冷水取出晾乾以上六味共為細末貯磁罐中遇有刀石破傷者用藥敷傷口以扇向傷處扇之立愈忌臥熱處如傷處發腫煎黃連水用翎毛蘸塗之即消沈氏醫案云傷處喜涼惡熱夏月宜臥涼地冬月忌臥熱處傷口不必包裹致過暖難於結痂並忌飲酒以致血熱妄行設遇傷處發腫以雞鵝翎毛蘸黃連水塗之可以立愈至於敷藥之時若流血乃用扇血不流則不扇蓋熱血迸出藥必隨血流去故藉扇力使血稍涼乃能凝結若血不流則不必扇也治瘭瘡神效方此病喜著十指初指頭先作黯疱後始腫赤黑黯瘮痛入心是也杉葉芽二錢白梅肉一錢上二味細研以水一盞拌和以患處浸之日六七次其水黏而痛立止若指頭潰爛露骨已欲頹落者用後方𨴗模吉𨴗兒蔑刺丹礬沒藥各等分上二味蜜和勻敷患處諸病蒸洗經驗秘方治痛風蒸洗法杜松八錢木通五錢荊芥三錢防風三錢上以水一升五合煮連滓熏洗治諸痛蒸洗法桂松上上野菊花上鼠麴草上羌活中防風中細辛下煎法同前一方加獨活芍藥桔梗癰疽發背諸腫瘍不能成膿者以之蒸洗之必潰而愈雞卵一枚麵粉四合蔥白一把酒一合生薑切一合上以水五合煮乘熱熨患處其效如神治陰門瘙癢疼痛蒸洗法艾葉十五七苦參七七荊芥十七防風五七地床子十七連翹三七上以水一升五合煮取一升頻湔患處治一切陰囊濕癢蒸洗法陳茶一撮蒼朮二錢皮硝三錢花椒地床子各一錢煨鹽半兩白礬一錢蒼耳子量入上水八合煎汁去渣入鹽硝礬泡化先蒸後洗三四次絕癢治五痔熨藥方忍冬黃柏黃連薄荷甘草皮各三錢蔥白五錢荊芥二錢上以水一升五合煮取一升二合熏洗患處又方蛇床子忍冬各四錢黃柏石草蒲甘草各二錢白礬一錢煎法同前或加荊芥三錢治脫肛妙方馬糞兩掬許入滾湯內攪和熏患處則瘙癢當甚乃傾去之再以雞屎一碗許入滾湯內蒸如前法三四日而必愈治瘰癧妙方治瘰癧破爛連及脅腋臭穢難聞三五載十數載不愈者藥到病起用新出窯礦石灰一塊滴水化開成粉用生桐油調勻乾溼得中先以花椒蔥煎湯洗淨其瘡以此塗之不數日全愈此法陳飛霞得一愚人屢取奇效云周曩歲治一老嫗瘰癧髮結喉者以赤小豆石灰等分細末數之全瘳牙齒疼痛不論尋常牙齒痛及齲齒疼痛以速效散止痛散擦患上止或含丁香散亦可此皆熱因熱用之治法也又有酒客內熱熾而用前方不效者宜開笑散又齲齒痛用諸藥並不效者宜取昆布上鹽胡椒大許包裹於絹以麻線縛於細竹條頭蘸熱麻油中乘熱印於齲齒臼中三兩次而痛如掃絕妙速效散治牙齒疼痛如神蘆薈丁香各四錢上為細末敷患處立功止痛散胡椒楊梅皮焰硝各等分上為末擦患處則痛更甚須臾全安丁香散艾葉大檳榔大花椒十粒丁子三個上三味盛布袋滾湯浸須臾絞之以患齒齧布袋熏之而後用藥汁含漱開笑散牙茶四錢大黃黃芩升麻當歸地黃牡丹皮各二錢細辛五分上八味以水五合煮取三合頻含漱治牙痛齲齒痛方燕屎長夏日取之上細末麻油和勻隨齒痛左右以少許入耳中即愈治齲齒疼痛灸法上齒痛者灸足三里下齒痛者灸列缺
